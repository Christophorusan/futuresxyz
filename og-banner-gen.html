<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Futuresxyz OG Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8ecf2; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.banner {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #dfe6f0 0%, #c9d6e8 30%, #e2e8f0 60%, #d4dde8 100%);
  position: relative;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
/* Subtle grid pattern */
.banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}
/* Glow accents */
.glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
}
.glow-1 { width: 500px; height: 500px; background: rgba(59,130,246,0.15); top: -150px; right: -50px; }
.glow-2 { width: 400px; height: 400px; background: rgba(45,212,191,0.12); bottom: -150px; left: -50px; }
.glow-3 { width: 350px; height: 350px; background: rgba(139,92,246,0.1); top: 50%; left: 50%; transform: translate(-50%,-50%); }

/* Glass card */
.glass-card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 28px;
  padding: 56px 72px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}
.logo-row {
  display: flex;
  align-items: center;
  gap: 18px;
}
.logo-row svg { color: #1a1a2e; }
.logo-text {
  font-size: 60px;
  font-weight: 800;
  color: #1a1a2e;
  letter-spacing: -2px;
}
.tagline {
  font-size: 22px;
  font-weight: 400;
  color: rgba(26,26,46,0.55);
  text-align: center;
  max-width: 700px;
  line-height: 1.5;
}
.pills {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.pill {
  padding: 7px 18px;
  border-radius: 100px;
  border: 1px solid rgba(0,0,0,0.08);
  color: rgba(26,26,46,0.45);
  font-size: 14px;
  font-weight: 500;
  background: rgba(255,255,255,0.35);
}
.pill.active {
  border-color: rgba(59,130,246,0.35);
  color: #1a1a2e;
  background: rgba(59,130,246,0.1);
}
.bottom-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #2dd4bf, #3b82f6, #8b5cf6);
}
</style>
</head>
<body>
<div class="banner">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>
  <div class="glass-card">
    <div class="logo-row">
      <svg width="52" height="52" viewBox="0 0 32 32" fill="none">
        <line x1="6" y1="2" x2="6" y2="30" stroke="currentColor" stroke-width="1.5"/>
        <rect x="2.5" y="7" width="7" height="15" rx="1" fill="currentColor"/>
        <rect x="12.5" y="9" width="7" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="22.5" y="5" width="7" height="11" rx="1" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="logo-text">Futuresxyz</span>
    </div>
    <div class="tagline">All of Hyperliquid in one terminal</div>
    <div class="pills">
      <span class="pill active">Perps</span>
      <span class="pill active">Swap</span>
      <span class="pill">Lend</span>
      <span class="pill">Predict</span>
      <span class="pill">Borrow</span>
      <span class="pill">Stake</span>
    </div>
  </div>
  <div class="bottom-bar"></div>
</div>
</body>
</html>
